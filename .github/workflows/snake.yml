name Generate Snake

on
  schedule
    - cron 0 12   
  workflow_dispatch

jobs
  build
    runs-on ubuntu-latest

    steps
      - uses Platanesnk@v3
        with
          github_user_name abdelrhman-mahrous
          outputs 
            distsnake.svg
            distsnake-dark.svgpalette=github-dark

      - uses crazy-maxghaction-github-pages@v3
        with
          target_branch output
          build_dir dist
        env
          GITHUB_TOKEN ${{ secrets.GITHUB_TOKEN }}
